<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Marcus · facework</title>
<style>
:root{
  --bg:#0f1115;--surface:#171a21;--border:#2a2f3a;
  --text:#e5e7eb;--muted:#9aa3b2;
  --ok:#6ee7b7;--warn:#fbbf24;--bad:#f87171;--info:#7dd3fc;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font:16px/1.6 system-ui,sans-serif}
body{display:flex;flex-direction:column;min-height:100vh}

.badge{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  font-size:11px;letter-spacing:.06em;color:var(--muted);
  background:var(--surface);border:1px solid var(--border);
  border-radius:999px;padding:3px 12px;z-index:10;white-space:nowrap;
}

.face{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:32px;padding:80px 24px 24px;
}

.orb-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}

.orb{
  width:52px;height:52px;border-radius:50%;
  background:var(--muted);
  transition:background .5s ease,opacity .5s ease;
  position:relative;
}
.orb::before{
  content:'';position:absolute;inset:-8px;border-radius:50%;
  border:1px solid transparent;
  transition:border-color .5s ease;
}

.s-stille .orb{background:var(--muted);opacity:.35;animation:ps 3s ease-in-out infinite}
.s-lytter .orb{background:var(--ok);opacity:.75;animation:pl 1.2s ease-in-out infinite}
.s-lytter .orb::before{border-color:var(--ok);animation:ring 1.2s ease-in-out infinite}
.s-taenker .orb{background:var(--info);opacity:.85;animation:pt .9s ease-in-out infinite}
.s-taenker .orb::before{border-color:var(--info);animation:ring .9s ease-in-out infinite}
.s-taler .orb{background:var(--text);opacity:1;animation:pk .45s ease-in-out infinite}
.s-pause .orb{background:var(--warn);opacity:.5}

@keyframes ps{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.1);opacity:.45}}
@keyframes pl{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes pt{0%,100%{transform:scale(1)}50%{transform:scale(1.14)}}
@keyframes pk{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes ring{0%{transform:scale(1);opacity:.35}100%{transform:scale(2.1);opacity:0}}

.state-label{
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);transition:color .4s ease;
}
.s-lytter .state-label{color:var(--ok)}
.s-taenker .state-label{color:var(--info)}
.s-taler .state-label{color:var(--text)}
.s-pause .state-label{color:var(--warn)}

.speech{max-width:540px;width:100%;text-align:center}

.user-line{
  font-size:14px;color:var(--muted);font-style:italic;
  margin-bottom:20px;min-height:22px;
  opacity:0;transition:opacity .5s ease;
}
.user-line.vis{opacity:1}

.marcus-text{
  font-size:22px;font-weight:300;line-height:1.55;
  min-height:110px;color:var(--text);
  transition:opacity .3s ease;
  white-space:pre-wrap;
}
.marcus-text.dim{opacity:.2}

.cursor{
  display:inline-block;width:2px;height:.92em;
  background:var(--ok);vertical-align:text-bottom;
  margin-left:2px;animation:blink .8s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.sketch-wrap{width:240px;height:150px;opacity:0;transition:opacity .5s ease;flex-shrink:0}
.sketch-wrap.vis{opacity:1}
.sketch-wrap svg{width:100%;height:100%;overflow:visible}
.sketch-wrap.stale{opacity:.4;filter:grayscale(.55)}
.sketch-wrap.stale svg path,.sketch-wrap.stale svg line,.sketch-wrap.stale svg rect,.sketch-wrap.stale svg circle,.sketch-wrap.stale svg polyline,.sketch-wrap.stale svg ellipse{stroke-dasharray:4 3}

.cards{
  position:fixed;right:20px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:8px;width:168px;
}
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;font-size:12px;
  transform:translateX(210px);opacity:0;
  transition:transform .4s cubic-bezier(.25,.8,.25,1),opacity .35s ease;
}
.card.vis{transform:translateX(0);opacity:1}
.card .k{color:var(--muted);font-size:11px;margin-bottom:2px}
.card .v{font-weight:500}
.card .v.ok{color:var(--ok)}
.card .v.info{color:var(--info)}

.bar{
  padding:14px 20px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:var(--surface);flex-shrink:0;
}
.controls{display:flex;gap:6px}
.btn{
  font:13px system-ui;background:transparent;color:var(--text);
  border:1px solid var(--border);border-radius:8px;
  padding:6px 14px;cursor:pointer;transition:border-color .2s;
}
.btn:hover{border-color:var(--muted)}
.btn.active{background:var(--ok);color:#03242e;border-color:var(--ok);font-weight:600}
.step{font-size:12px;color:var(--muted)}
.link{
  font-size:12px;color:var(--muted);text-decoration:none;
  border:1px solid var(--border);border-radius:6px;padding:5px 10px;
  transition:color .2s,border-color .2s;
}
.link:hover{color:var(--text);border-color:var(--muted)}

@media(max-width:640px){
  .cards{display:none}
  .marcus-text{font-size:18px}
  .badge{font-size:10px;padding:2px 8px}
}
</style>
</head>
<body>

<div class="badge" id="badge">SK-133 · henter…</div>

<div class="face s-stille" id="face">
  <div class="orb-wrap">
    <div class="orb"></div>
    <div class="state-label" id="slabel">stille</div>
  </div>
  <div class="sketch-wrap" id="sketch-wrap">
    <svg id="sketch" viewBox="0 0 240 150" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="speech">
    <div class="user-line" id="uline"></div>
    <div class="marcus-text" id="mtext"></div>
  </div>
</div>

<div class="cards">
  <div class="card" id="c-decay">
    <div class="k">decay</div>
    <div class="v" id="c-decay-v">—</div>
  </div>
  <div class="card" id="c-board">
    <div class="k">board</div>
    <div class="v" id="c-board-v">tasks · —</div>
  </div>
</div>

<div class="bar">
  <div class="controls">
    <button class="btn" id="bprev" aria-label="Forrige">←</button>
    <button class="btn active" id="bplay">▶ Afspil</button>
    <button class="btn" id="bnext" aria-label="Næste">→</button>
  </div>
  <span class="step" id="step">1 / 7</span>
  <a href="../boards/marcus-face/marcus-face.html" class="link">boards → anatomi</a>
</div>

<script>
(function(){
var face=document.getElementById('face');
var slabel=document.getElementById('slabel');
var uline=document.getElementById('uline');
var mtext=document.getElementById('mtext');
var step=document.getElementById('step');
var bplay=document.getElementById('bplay');
var bprev=document.getElementById('bprev');
var bnext=document.getElementById('bnext');
var cards={decay:document.getElementById('c-decay'),board:document.getElementById('c-board')};
var sw=document.getElementById('sketch-wrap');
var sk=document.getElementById('sketch');

var STATES=['stille','lytter','taenker','taler','pause'];
var LABELS={stille:'stille',lytter:'lytter',taenker:'tænker',taler:'taler',pause:'pause'};

var SVG_LYTTER='<g stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="70" cy="38" r="14" stroke-width="2.5"/><line x1="70" y1="52" x2="70" y2="94" stroke-width="3"/><line x1="70" y1="67" x2="52" y2="78" stroke-width="2"/><line x1="70" y1="67" x2="88" y2="78" stroke-width="2"/><line x1="70" y1="94" x2="58" y2="120" stroke-width="2.5"/><line x1="70" y1="94" x2="82" y2="120" stroke-width="2.5"/><path d="M108,28 Q124,38 108,48" stroke="var(--ok)" stroke-width="2.5" fill="none"/><path d="M114,20 Q136,37 114,54" stroke="var(--ok)" stroke-width="2" fill="none"/><circle cx="170" cy="36" r="22" stroke="var(--ok)" stroke-width="2" fill="var(--surface)"/><text x="170" y="45" font-size="24" text-anchor="middle" fill="var(--ok)" stroke="none" font-family="system-ui">?</text></g>';

var SVG_TAENKER='<g stroke="currentColor" fill="none" stroke-linecap="round"><circle cx="44" cy="94" r="10" stroke-width="2.5"/><line x1="44" y1="104" x2="44" y2="132" stroke-width="2.5"/><line x1="44" y1="115" x2="34" y2="126" stroke-width="2"/><line x1="44" y1="115" x2="54" y2="126" stroke-width="2"/><circle cx="63" cy="79" r="3" fill="currentColor" stroke="none"/><circle cx="76" cy="66" r="4" fill="currentColor" stroke="none"/><rect x="84" y="10" width="136" height="60" rx="30" stroke-width="2" fill="var(--surface)"/><ellipse cx="96" cy="66" rx="12" ry="7" stroke-width="2" fill="var(--surface)"/><circle cx="120" cy="40" r="5.5" fill="var(--info)" stroke="none"/><circle cx="152" cy="34" r="5.5" fill="var(--info)" stroke="none"/><circle cx="184" cy="40" r="5.5" fill="var(--info)" stroke="none"/></g>';

function svgFiler(){
  var known=LIVE.loaded&&LIVE.uncKnown;
  var n=known?String(LIVE.uncCount):'?';
  var nfill=(known&&LIVE.uncCount>0)?'var(--warn)':'var(--muted)';
  var lbl=!LIVE.loaded?'commit':(known?(LIVE.uncCount===0?'committet':'uncommitted'):'ukendt');
  var b=(LIVE.loaded&&LIVE.backupDays!=null)?LIVE.backupDays+'d':'–';
  return '<g stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="44" width="36" height="44" rx="2" stroke-width="1.5" fill="var(--surface)"/><rect x="11" y="35" width="36" height="44" rx="2" stroke-width="1.5" fill="var(--surface)"/><rect x="16" y="26" width="36" height="44" rx="2" stroke-width="1.5" fill="var(--surface)"/><rect x="21" y="17" width="36" height="44" rx="2" stroke-width="1.5" fill="var(--surface)"/><rect x="26" y="8" width="36" height="44" rx="2" stroke-width="2.5" fill="var(--bg)"/><path d="M50,8 L62,20 L50,20 Z" stroke-width="1.5" fill="var(--surface)"/><text x="44" y="32" font-size="13" font-weight="bold" text-anchor="middle" fill="'+nfill+'" stroke="none" font-family="system-ui">'+n+'</text><text x="44" y="64" font-size="8" text-anchor="middle" fill="var(--muted)" stroke="none" font-family="system-ui">'+lbl+'</text><line x1="76" y1="55" x2="94" y2="55" stroke="var(--muted)" stroke-width="1.5"/><polyline points="91,51 97,55 91,59" stroke="var(--muted)" stroke-width="1.5" fill="none"/><rect x="102" y="18" width="52" height="48" rx="3" stroke-width="2"/><path d="M105,18 Q102,18 102,21 L102,30 L154,30 L154,21 Q154,18 151,18 Z" fill="var(--warn)" stroke="none"/><rect x="102" y="18" width="52" height="48" rx="3" stroke-width="2" fill="none"/><line x1="116" y1="13" x2="116" y2="24" stroke-width="2.5"/><line x1="140" y1="13" x2="140" y2="24" stroke-width="2.5"/><text x="128" y="52" font-size="17" font-weight="bold" text-anchor="middle" fill="var(--text)" stroke="none" font-family="system-ui">'+b+'</text><text x="128" y="63" font-size="8" text-anchor="middle" fill="var(--muted)" stroke="none" font-family="system-ui">backup</text></g>';
}

var SVG_BACKLOG='<g stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><rect x="20" y="82" width="62" height="15" rx="2" stroke-width="1.5" fill="var(--surface)"/><rect x="20" y="64" width="62" height="15" rx="2" stroke-width="1.5" fill="var(--surface)"/><rect x="20" y="46" width="62" height="15" rx="2" stroke-width="1.5" fill="var(--surface)"/><rect x="20" y="28" width="62" height="15" rx="2" stroke-width="2.5" fill="var(--bg)"/><text x="51" y="40" font-size="9" font-weight="600" text-anchor="middle" fill="var(--muted)" stroke="none" font-family="system-ui">BACKLOG</text><line x1="96" y1="24" x2="96" y2="102" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="5,4"/><line x1="110" y1="64" x2="202" y2="46" stroke="var(--ok)" stroke-width="3"/><polyline points="191,38 204,44 196,53" stroke="var(--ok)" stroke-width="3" fill="none" stroke-linejoin="round"/><text x="166" y="38" font-size="9" text-anchor="middle" fill="var(--ok)" stroke="none" font-family="system-ui">→ later</text></g>';

var LIVE={loaded:false,stale:false,ageDays:null,uncKnown:false,uncCount:null,backupDays:null,backlog:null};

function talerText(withBacklog){
  if(!LIVE.loaded) return 'Henter min tilstand…';
  var bak=LIVE.backupDays!=null?(LIVE.backupDays===1?'én dag':LIVE.backupDays+' dage'):'? dage';
  var main;
  if(!LIVE.uncKnown) main='Commit-tilstanden kan jeg ikke aflæse lige nu (kilden mangler). Backup-bundlen er '+bak+' gammel.';
  else if(LIVE.uncCount===0) main='Alt er committet. Backup-bundlen er '+bak+' gammel.';
  else main='Der er ucommittede ændringer ('+LIVE.uncCount+'/2 git-træer). Backup-bundlen er '+bak+' gammel.';
  if(withBacklog) main+='\n\nResten er backlog'+(LIVE.backlog!=null?' ('+LIVE.backlog+' ting)':'')+'.';
  if(LIVE.stale) main+='\n\n(øjebliksbillede ~'+LIVE.ageDays+'d gammelt)';
  return main;
}

var SCRIPT=[
  {state:'stille',user:'',text:'',show:[],dur:2500,svg:null},
  {state:'lytter',user:'"Hvad er vigtigst i dag?"',text:'',show:['decay'],dur:2200,svg:SVG_LYTTER},
  {state:'taenker',user:'"Hvad er vigtigst i dag?"',text:'',show:['decay'],dur:1900,svg:SVG_TAENKER},
  {state:'taler',user:'"Hvad er vigtigst i dag?"',live:true,show:['decay','board'],dur:4800,svg:svgFiler},
  {state:'pause',user:'"Hvad er vigtigst i dag?"',live:true,show:['decay','board'],dur:1900,svg:svgFiler},
  {state:'taler',user:'"Hvad er vigtigst i dag?"',live:true,bl:true,show:['board'],dur:3200,svg:SVG_BACKLOG},
  {state:'stille',user:'',live:true,bl:true,show:[],dur:0,svg:null},
];

var cur=0,playing=false,timer=null,typer=null;

function applyState(s){
  STATES.forEach(function(x){face.classList.remove('s-'+x);});
  face.classList.add('s-'+s);
  slabel.textContent=LABELS[s]||s;
}

function applyCards(show){
  Object.keys(cards).forEach(function(k){cards[k].classList.remove('vis');});
  show.forEach(function(k){if(cards[k])cards[k].classList.add('vis');});
}

function killTyper(){if(typer){clearInterval(typer);typer=null;}}

function typeOut(text){
  killTyper();
  mtext.textContent='';
  if(!text)return;
  var cursor=document.createElement('span');
  cursor.className='cursor';
  mtext.appendChild(cursor);
  var i=0;
  typer=setInterval(function(){
    if(i<text.length){mtext.insertBefore(document.createTextNode(text[i]),cursor);i++;}
    else{clearInterval(typer);typer=null;cursor.remove();}
  },26);
}

function render(idx,animate){
  var s=SCRIPT[idx];
  applyState(s.state);
  applyCards(s.show);
  var svgContent=(typeof s.svg==='function')?s.svg():s.svg;
  if(svgContent){sk.innerHTML=svgContent;sw.classList.add('vis');}
  else{sk.innerHTML='';sw.classList.remove('vis');}
  sw.classList.toggle('stale',!!(LIVE.loaded&&LIVE.stale&&svgContent));
  step.textContent=(idx+1)+' / '+SCRIPT.length;
  uline.textContent=s.user;
  uline.classList.toggle('vis',!!s.user);
  mtext.classList.remove('dim');
  var txt=s.live?talerText(!!s.bl):s.text;
  if(s.state==='taenker'){
    killTyper();mtext.textContent=txt;mtext.classList.add('dim');
  } else if(animate&&s.state==='taler'){
    typeOut(txt);
  } else {
    killTyper();mtext.textContent=txt;
  }
}

function stopAuto(){
  playing=false;
  if(timer){clearTimeout(timer);timer=null;}
  if(cur>=SCRIPT.length-1){bplay.textContent='↺ Igen';bplay.className='btn';}
  else{bplay.textContent='▶ Afspil';bplay.className='btn active';}
}

function advance(){
  var dur=SCRIPT[cur].dur||2000;
  timer=setTimeout(function(){
    if(cur<SCRIPT.length-1){cur++;render(cur,true);if(playing)advance();}
    else{stopAuto();}
  },dur);
}

function startAuto(){playing=true;bplay.textContent='⏸ Pause';bplay.className='btn active';advance();}

bplay.addEventListener('click',function(){
  if(playing){stopAuto();}
  else if(cur>=SCRIPT.length-1){cur=0;render(cur,false);startAuto();}
  else{startAuto();}
});
bprev.addEventListener('click',function(){stopAuto();if(cur>0){cur--;render(cur,false);}});
bnext.addEventListener('click',function(){stopAuto();if(cur<SCRIPT.length-1){cur++;render(cur,true);}});

window.__faceworkApplyLive=function(live){for(var k in live){LIVE[k]=live[k];}LIVE.loaded=true;render(cur,false);};
render(0,false);
})();
</script>

<script>
(function(){
var GIST_ID='3746918d37090c31dcab5744f3634646';

if(!GIST_ID)return;

var badge=document.getElementById('badge');

function ago(iso){
  var m=Math.round((Date.now()-new Date(iso))/60000);
  if(m<1)return'nu';if(m<60)return m+'m siden';
  if(m<1440)return Math.round(m/60)+'t siden';
  return Math.round(m/1440)+'d siden';
}

function setCard(id,text,cls){
  var el=document.getElementById(id);if(!el)return;
  el.textContent=text;el.className='v'+(cls?' '+cls:'');
}

fetch('https://api.github.com/gists/'+GIST_ID)
  .then(function(r){return r.json();})
  .then(function(data){
    var raw=data.files&&data.files['marcus-state.json'];
    if(!raw)throw new Error('no state');
    var s=JSON.parse(raw.content);

    // uncommitted: dirty.{d,c} is structurally broken upstream — push-facework-state.mjs coerces an
    // INTEGER count with `=== true`, so the Gist always publishes boolean false (NOT "0 = clean").
    // Only trust it once push publishes real numeric counts; until then show NO-DATA (never a fake "committet").
    var dv=s.dirty||{};
    var dNum=(typeof dv.d==='number'),cNum=(typeof dv.c==='number');
    var uncKnown=dNum||cNum;
    var uncCount=uncKnown?(((dNum?dv.d:0)>0?1:0)+((cNum?dv.c:0)>0?1:0)):null;
    var backupDays=(s.backup_age_days!=null)?Math.round(s.backup_age_days):null;
    var backlog=(s.open&&s.open.tasks_trin1!=null)?((s.open.tasks_trin1||0)+(s.open.tasks_trin2||0)):null;

    // staleness from generated_at (canonical fresh threshold = 2 days / 48h)
    var ageH=s.generated_at?((Date.now()-new Date(s.generated_at))/3600000):null;
    var stale=(ageH!=null)&&(ageH>48);

    var decayTxt=(s.decay||'?')+(s.days_since_interaction!=null?' · '+s.days_since_interaction+'d':'');
    var decayCls=s.decay==='fresh'?'ok':s.decay==='drifting'?'info':'bad';
    setCard('c-decay-v',decayTxt,decayCls);

    // calibration_cap is per-session, NOT a disk fact -> not shown as a live card

    setCard('c-board-v',backlog!=null?'tasks · '+backlog+' åbne':'tasks · —','');

    // feed sketch + narration; the demo engine owns rendering so values survive re-renders
    if(window.__faceworkApplyLive){
      window.__faceworkApplyLive({
        uncKnown:uncKnown,uncCount:uncCount,backupDays:backupDays,backlog:backlog,
        stale:stale,ageDays:(ageH!=null?Math.max(1,Math.round(ageH/24)):null)
      });
    }

    if(badge&&s.generated_at){
      badge.textContent='SK-133 · '+(stale?'stale':'live')+' · '+ago(s.generated_at);
      badge.style.color=stale?'var(--bad)':'var(--ok)';
    }
  })
  .catch(function(){
    if(badge){badge.textContent='SK-133 · offline';badge.style.color='var(--bad)';}
  });
})();
</script>
</body>
</html>
