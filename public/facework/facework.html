<!doctype html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Marcus · facework v2</title>
<style>
:root{--bg:#0f1115;--surface:#171a21;--border:#2a2f3a;--text:#e5e7eb;--muted:#9aa3b2;--ok:#6ee7b7;--warn:#fbbf24;--bad:#f87171;--info:#7dd3fc}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font:16px/1.6 system-ui,sans-serif}
body{display:flex;flex-direction:column;min-height:100vh;align-items:center;justify-content:center;padding:24px}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
.badge{font-size:11px;letter-spacing:.08em;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:3px 12px;margin-bottom:14px;white-space:nowrap}
.stage{width:100%;max-width:360px;min-width:288px}
.lab{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);min-height:15px;text-align:center;margin-bottom:4px;transition:color .4s}
.m-lytte .lab{color:var(--ok)}.m-taenke .lab{color:var(--info)}.m-auto .lab{color:var(--warn)}.m-tale .lab{color:var(--text)}
canvas{width:100%;height:auto;display:block}
.speech{min-height:52px;margin-top:10px;font-size:15px;font-weight:300;line-height:1.5;text-align:center;color:var(--text)}
.bar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.btn{font:13px system-ui;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;transition:border-color .2s,background .2s}
.btn:hover{border-color:var(--muted)}
.btn.on{background:var(--ok);color:#03242e;border-color:var(--ok);font-weight:500}
.pb{font:13px system-ui;background:transparent;color:var(--muted);border:1px dashed var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;margin-left:4px}
.pb:hover{color:var(--text);border-color:var(--muted)}
.foot{font-size:11px;color:#5a6270;margin-top:12px;text-align:center}
.foot a{color:var(--muted)}
</style>
</head>
<body>
<div class="badge" id="badge">SK-134 · henter…</div>
<div class="stage m-vente" id="stage">
  <h2 class="sr" id="srhead">Marcus' facework — et ansigt der viser hans tilstand via to orbe og en data-ryg.</h2>
  <div class="lab" id="lab">venter</div>
  <canvas id="cv" role="img" aria-label="Marcus venter"></canvas>
  <div class="speech" id="speech" aria-hidden="true"></div>
  <div class="sr" id="sr" aria-live="polite" aria-atomic="true"></div>
  <div class="bar">
    <button class="btn" data-m="vente">vente</button>
    <button class="btn" data-m="lytte">lytte</button>
    <button class="btn" data-m="taenke">tænke</button>
    <button class="btn" data-m="auto">auto</button>
    <button class="btn" data-m="tale">tale</button>
    <button class="pb" id="play">spil igennem</button>
  </div>
  <div class="foot"><a href="../boards/marcus-face/marcus-face.html">boards → anatomi</a> · krop = stadie · grøn = cursor/pen</div>
</div>
<script>
(function(){
var cv=document.getElementById('cv'),ctx=cv.getContext('2d');
var stage=document.getElementById('stage'),lab=document.getElementById('lab'),speech=document.getElementById('speech'),sr=document.getElementById('sr'),playBtn=document.getElementById('play');
var W=360,H=210,baseY=150,BR=15;
var dpr=Math.max(1,Math.min(3,window.devicePixelRatio||1));
cv.width=Math.round(W*dpr);cv.height=Math.round(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);
var reduced=!!(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches);
var COL={vente:[154,163,178],lytte:[110,231,183],taenke:[125,211,252],auto:[251,191,36],tale:[229,231,235]};
var START={vente:180,lytte:226,taenke:140,auto:180,tale:46};
var big={x:180,y:baseY,vx:0,vy:0,r:BR,col:[154,163,178]};
var green={x:250,y:baseY,vx:0,vy:0,r:4.5};
var target=COL.vente.slice(),bigTX=180,tick=0,mode='vente',autoT=0,gAng=0,gTX=250,gIT=0,waitT=0,prog=0,player=null;

// ---------- live data ----------
var GIST='3746918d37090c31dcab5744f3634646';
var LIVE={loaded:false,ok:false,stale:false,ageDays:null,decay:null,days:null,uncKnown:false,uncCount:null,backlog:null,bugsHigh:null,backupDays:null,promoted:null};
function num(v){return typeof v==='number'&&isFinite(v)?v:null;}
function setBadge(){
  var b=document.getElementById('badge');if(!b)return;
  if(!LIVE.loaded){b.textContent='SK-134 · henter…';b.style.color='var(--muted)';return;}
  if(!LIVE.ok){b.textContent='SK-134 · offline';b.style.color='var(--bad)';return;}
  var age=LIVE.ageDays==null?'alder ukendt':(LIVE.ageDays<=0?'i dag':LIVE.ageDays+'d siden');
  b.textContent='SK-134 · '+(LIVE.stale?'gammelt':'live')+' · '+age;
  b.style.color=LIVE.stale?'var(--warn)':'var(--ok)';
}
function loadGist(){
  fetch('https://api.github.com/gists/'+GIST).then(function(r){if(!r.ok)throw r.status;return r.json();}).then(function(d){
    var raw=d.files&&d.files['marcus-state.json'];if(!raw)throw 0;
    var s=JSON.parse(raw.content),dv=s.dirty||{};
    var dN=typeof dv.d==='number',cN=typeof dv.c==='number';
    LIVE.uncKnown=dN&&cN; // BEGGE træer skal være numeriske (count); ellers NO-DATA (aldrig fake-green i overgang)
    LIVE.uncCount=LIVE.uncKnown?((dv.d>0?1:0)+(dv.c>0?1:0)):null;
    var t1=num(s.open&&s.open.tasks_trin1),t2=num(s.open&&s.open.tasks_trin2);
    LIVE.backlog=(t1!=null&&t2!=null)?t1+t2:null; // kræv BEGGE felter (ingen fake-low)
    LIVE.bugsHigh=s.open?num(s.open.bugs_high):null;
    LIVE.promoted=s.open?num(s.open.sketches_promoted):null;
    var bd=num(s.backup_age_days);LIVE.backupDays=bd!=null?Math.round(bd):null;
    LIVE.decay=s.decay||null;LIVE.days=num(s.days_since_interaction);
    var tms=s.generated_at?new Date(s.generated_at).getTime():NaN;
    var ageH=isFinite(tms)?((Date.now()-tms)/3600000):null;
    LIVE.ageDays=ageH!=null?Math.max(0,Math.floor(ageH/24)):null;
    LIVE.stale=(LIVE.decay&&LIVE.decay!=='fresh')||(ageH!=null&&ageH>48)||(LIVE.decay==null&&ageH==null); // friskhed skal bevises
    LIVE.loaded=true;LIVE.ok=true;onData();
  }).catch(function(){LIVE.loaded=true;LIVE.ok=false;onData();});
}
function onData(){
  setBadge();setAria();
  if(mode==='tale'&&ridge.length===0){buildRidge();setNarr(ridgeNarration());if(taleStage==='wait')taleStage='draw';}
  if(reduced){step();draw();}
}

// ---------- ridge (default tale technique, La Linea one-stroke, honest) ----------
var ridge=[],ridgeLabels=[];
function buildRidge(){
  var M=[];
  M.push(LIVE.uncKnown?{l:'commit',v:LIVE.uncCount,ref:2,warn:LIVE.uncCount>0}:{l:'commit',nodata:true});
  M.push({l:'backlog',v:LIVE.backlog,ref:60,nodata:LIVE.backlog==null});
  M.push({l:'bugs',v:LIVE.bugsHigh,ref:10,warn:(LIVE.bugsHigh||0)>7,nodata:LIVE.bugsHigh==null}); // warn-tærskel >7 (ikke baseline 5); jf. design-doc
  M.push({l:'backup',v:LIVE.backupDays,ref:7,warn:(LIVE.backupDays||0)>3,nodata:LIVE.backupDays==null});
  M.push({l:'fremdrift',v:LIVE.promoted,ref:120,nodata:LIVE.promoted==null});
  var x0=70,x1=330,n=M.length,seg=(x1-x0)/n,maxH=66;
  ridge=[{x:x0,y:baseY}];ridgeLabels=[];
  for(var i=0;i<n;i++){var cx=x0+seg*i+seg/2,m=M[i];
    if(m.nodata){ridge.push({x:cx,y:baseY,nodata:true});ridgeLabels.push({x:cx,y:baseY+14,t:m.l+' ?',muted:true});}
    else{var h=Math.max(5,Math.min(maxH,(m.v/m.ref)*maxH));ridge.push({x:cx,y:baseY-h,warn:!!m.warn});ridgeLabels.push({x:cx,y:baseY+14,t:m.l+' '+m.v,warn:!!m.warn});}
  }
  ridge.push({x:x1,y:baseY});
}
function ridgeNarration(){
  if(!LIVE.loaded)return 'Henter min tilstand…';
  if(!LIVE.ok)return 'Jeg kan ikke nå min tilstand lige nu (offline).';
  var b=(LIVE.backlog!=null?LIVE.backlog:'?')+' i backlog, '+(LIVE.bugsHigh!=null?LIVE.bugsHigh:'?')+' høj-bugs, backup '+(LIVE.backupDays!=null?LIVE.backupDays+'d':'?');
  var c=LIVE.uncKnown?(LIVE.uncCount===0?'Alt er committet.':'Der er ucommittede ændringer ('+LIVE.uncCount+'/2 træer).'):'Commit-tilstanden kender jeg ikke endnu (kilden opdateres ved næste pulse).';
  var s='Lige nu: '+b+'. '+c;
  if(LIVE.stale)s+=' (øjebliksbillede ~'+(LIVE.ageDays!=null?LIVE.ageDays+'d':'alder ukendt')+(LIVE.ageDays!=null?' gammelt':'')+')';
  return s;
}

// ---------- narration ----------
var narr='',typed=0,typer=null;
function setNarr(t){narr=t;sr.textContent=t;if(typer){clearInterval(typer);typer=null;}
  if(reduced){typed=narr.length;speech.textContent=narr;}
  else{typed=0;speech.textContent='';typer=setInterval(function(){if(typed<narr.length){typed++;speech.textContent=narr.slice(0,typed);}else{clearInterval(typer);typer=null;}},34);}}

// ---------- aria ----------
function setAria(){cv.setAttribute('aria-label','Marcus '+(mode==='tale'?'taler':mode)+'. '+(LIVE.loaded?ridgeNarration():'henter tilstand')); }

// ---------- mode ----------
var taleStage='none';
function setMode(m){
  mode=m;target=COL[m];bigTX=START[m];autoT=0;waitT=0;gIT=0;prog=0;
  narr='';typed=0;ridge=[];ridgeLabels=[];if(typer){clearInterval(typer);typer=null;}speech.textContent='';sr.textContent='';
  [].slice.call(document.querySelectorAll('.btn')).forEach(function(b){b.classList.toggle('on',b.dataset.m===m);});
  stage.className='stage m-'+m;lab.textContent=m==='auto'?'auto · arbejder selv':m==='tale'?'taler':m;
  taleStage=(m==='tale')?'wait':'none';
  setAria();
  if(reduced){step();draw();}
}
function orbit(sp){gAng+=sp;var R=big.r+13;var ox=big.x+Math.cos(gAng)*R,oy=big.y+Math.sin(gAng)*R*0.62;green.x+=(ox-green.x)*0.4;green.y+=(oy-green.y)*0.4;green.r+=(4-green.r)*0.2;}

// ---------- step (physics) ----------
function step(){
  if(reduced){
    big.x=bigTX;big.y=baseY;big.r=BR;for(var k=0;k<3;k++)big.col[k]=target[k];
    if(mode==='tale'){
      if(ridge.length===0&&LIVE.loaded){buildRidge();setNarr(ridgeNarration());}
      taleStage=(ridge.length?'done':'wait');prog=1;
      var L=ridge.length?ridge[ridge.length-1]:null;if(L){green.x=L.x;green.y=L.y;}green.r=4.2;
    }else{green.x=big.x+big.r+12;green.y=baseY;green.r=4;}
    return;
  }
  tick++;
  for(var k2=0;k2<3;k2++)big.col[k2]+=(target[k2]-big.col[k2])*0.12;
  var rY=baseY;if(mode==='taenke')rY=baseY-6*Math.max(0,Math.sin(tick*0.05));
  big.vy+=-0.022*(big.y-rY);big.vy*=0.88;big.y+=big.vy;
  if(mode==='auto'){autoT++;if(autoT>120){autoT=0;bigTX=70+Math.random()*210;}}
  big.vx+=-0.02*(big.x-bigTX);big.vx*=0.84;big.x+=big.vx;
  var br=BR+(mode==='vente'?Math.sin(tick*0.04)*1.3:0);big.r+=(br-big.r)*0.2;
  if(mode==='tale'){
    if(taleStage==='wait'){
      waitT++;orbit(0.16);
      var settled=Math.abs(big.x-bigTX)<4&&Math.abs(big.vx)<0.4&&waitT>16;
      if(LIVE.loaded&&(settled||waitT>300)){taleStage='draw';buildRidge();setNarr(ridgeNarration());}
    }else{
      prog=narr.length?Math.min(1,typed/narr.length):1;
      var fp=prog*(ridge.length-1),idx=Math.floor(fp),frac=fp-idx;
      var a=ridge[idx]||ridge[ridge.length-1],bb=ridge[Math.min(ridge.length-1,idx+1)];
      green.x=a.x+(bb.x-a.x)*frac;green.y=a.y+(bb.y-a.y)*frac;green.r+=(4.2-green.r)*0.3;
      if(prog>=1&&!typer)taleStage='done';
    }
  }else if(mode==='taenke'){orbit(0.15);}
  else if(mode==='lytte'){var hx=big.x+big.r+11,hy=big.y-5+Math.sin(tick*0.25)*1.6;green.vx+=-0.07*(green.x-hx);green.vx*=0.78;green.x+=green.vx;green.vy+=-0.07*(green.y-hy);green.vy*=0.78;green.y+=green.vy;green.r+=(3.8-green.r)*0.1;}
  else if(mode==='auto'){gIT++;if(gIT>45){gIT=0;gTX=60+Math.random()*250;}green.vx+=-0.035*(green.x-gTX);green.vx*=0.8;green.x+=green.vx;green.vy+=-0.05*(green.y-(baseY-18+Math.sin(tick*0.1)*12));green.vy*=0.78;green.y+=green.vy;green.r+=(4-green.r)*0.1;}
  else{gIT++;if(gIT>150){gIT=0;gTX=70+Math.random()*220;}green.vx+=-0.015*(green.x-gTX);green.vx*=0.86;green.x+=green.vx;green.vy+=-0.04*(green.y-(baseY-2+Math.sin(tick*0.04)*3));green.vy*=0.82;green.y+=green.vy;green.r+=(4-green.r)*0.1;}
}

// ---------- draw ----------
function draw(){
  ctx.clearRect(0,0,W,H);
  var dim=(mode==='tale'&&LIVE.stale)?0.4:1;
  ctx.strokeStyle='rgba(229,231,235,0.26)';ctx.lineWidth=2;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(20,baseY);ctx.lineTo(W-20,baseY);ctx.stroke();
  if(mode==='lytte'){var rp=reduced?0.5:(tick%66)/66;ctx.strokeStyle='rgba(110,231,183,'+(0.5*(1-rp))+')';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(big.x,big.y,big.r+4+rp*20,0,7);ctx.stroke();}
  if(mode==='taenke'){for(var d=0;d<3;d++){var oy=reduced?0:Math.sin(tick*0.08+d*0.7)*2;ctx.fillStyle='rgba(125,211,252,0.9)';ctx.beginPath();ctx.arc(big.x-9+d*9,big.y-big.r-9+oy,2.4,0,7);ctx.fill();}}
  if(mode==='auto'){for(var sc=0;sc<2;sc++){var an=reduced?(sc?Math.PI:0):tick*0.045+sc*Math.PI;ctx.fillStyle='rgba(251,191,36,'+(sc?0.6:0.95)+')';ctx.beginPath();ctx.arc(big.x+Math.cos(an)*(big.r+12),big.y+Math.sin(an)*(big.r+12),sc?2.6:3.4,0,7);ctx.fill();}}
  if(mode==='tale'&&taleStage!=='wait'&&ridge.length>1){
    var upto=Math.max(1,Math.floor(prog*(ridge.length-1)));
    ctx.strokeStyle='rgba(110,231,183,'+dim+')';ctx.lineWidth=2.4;ctx.lineJoin='round';ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(ridge[0].x,ridge[0].y);
    for(var j=1;j<=upto;j++)ctx.lineTo(ridge[j].x,ridge[j].y);
    ctx.lineTo(green.x,green.y);ctx.stroke();
    for(var p=1;p<ridge.length-1;p++){if(p>upto)break;var pt=ridge[p];
      if(pt.nodata){ctx.strokeStyle='rgba(154,163,178,'+(0.6*dim)+')';ctx.lineWidth=1.4;ctx.beginPath();ctx.arc(pt.x,baseY-6,3.6,0,7);ctx.stroke();ctx.fillStyle='rgba(154,163,178,'+(0.6*dim)+')';ctx.font='9px system-ui';ctx.textAlign='center';ctx.fillText('?',pt.x,baseY-13);}
      else if(pt.warn){ctx.fillStyle='rgba(251,191,36,'+dim+')';ctx.beginPath();ctx.arc(pt.x,pt.y,2.6,0,7);ctx.fill();}}
    ctx.font='8px system-ui';ctx.textAlign='center';
    for(var q=0;q<ridgeLabels.length;q++){if((q+1)>upto)break;var L=ridgeLabels[q];ctx.fillStyle=(L.warn?'rgba(251,191,36,'+dim:L.muted?'rgba(154,163,178,'+(0.5*dim):'rgba(154,163,178,'+dim)+')';ctx.fillText(L.t,L.x,L.y);}
  }
  var bodyA=(mode==='tale'&&LIVE.stale)?0.55:1,sq=Math.min(0.2,Math.abs(big.vy)*0.02);
  ctx.globalAlpha=bodyA;ctx.fillStyle='rgb('+Math.round(big.col[0])+','+Math.round(big.col[1])+','+Math.round(big.col[2])+')';
  ctx.beginPath();ctx.ellipse(big.x,big.y,big.r*(1-sq),big.r*(1+sq),0,0,7);ctx.fill();ctx.globalAlpha=1;
  ctx.fillStyle='rgba(110,231,183,'+(mode==='tale'?dim:1)+')';ctx.beginPath();ctx.arc(green.x,green.y,green.r,0,7);ctx.fill();
}

// ---------- loop ----------
function tickLoop(){step();draw();if(!reduced)requestAnimationFrame(tickLoop);}
if(window.matchMedia){var mq=window.matchMedia('(prefers-reduced-motion: reduce)');(mq.addEventListener?mq.addEventListener.bind(mq,'change'):mq.addListener.bind(mq))(function(e){reduced=e.matches;if(reduced){step();draw();}else tickLoop();});}

// ---------- controls ----------
[].slice.call(document.querySelectorAll('.btn')).forEach(function(b){b.addEventListener('click',function(){stopPlay();setMode(b.dataset.m);});});
function stopPlay(){if(player){clearTimeout(player);player=null;}playBtn.textContent='spil igennem';}
var durs={vente:1600,lytte:1900,taenke:2200,auto:2200,tale:6000},ms=['vente','lytte','taenke','auto','tale'];
function play(i){setMode(ms[i]);player=setTimeout(function(){if(i<ms.length-1)play(i+1);else stopPlay();},durs[ms[i]]);}
playBtn.addEventListener('click',function(){if(player)stopPlay();else{playBtn.textContent='stop';play(0);}});

loadGist();setMode('vente');tickLoop();
})();
</script>
</body>
</html>
